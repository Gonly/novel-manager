{% extends "base.html" %}
{% block title %}📖 新增书籍 - 小说管理站{% endblock %}

{% block content %}
<div class="form-page">
    <h1>📖 新增书籍</h1>

    {% if errors %}
    <ul class="errors">
        {% for err in errors %}
        <li>{{ err }}</li>
        {% endfor %}
    </ul>
    {% endif %}

    <form method="POST" action="{{ url_for('add_book') }}" enctype="multipart/form-data">
        <div class="form-group">
            <label for="title">书名 *</label>
            <input type="text" id="title" name="title" value="{{ title or '' }}" placeholder="输入书名" required>
        </div>

        <div class="form-group">
            <label for="author">作者</label>
            <input type="text" id="author" name="author" value="{{ author or '' }}" placeholder="输入作者（可选）">
        </div>

        <div class="form-group">
            <label for="description">简介</label>
            <textarea id="description" name="description" placeholder="输入书籍简介（可选）">{{ description or '' }}</textarea>
        </div>

        <div class="form-group">
            <label for="file">TXT 文件 *</label>
            <input type="file" id="file" name="file" accept=".txt" required>
            <small>仅支持 .txt 格式，最大 50MB</small>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">📤 上传并添加</button>
            <a href="{{ url_for('index') }}" class="btn btn-secondary">取消</a>
        </div>
    </form>
</div>
{% endblock %}
